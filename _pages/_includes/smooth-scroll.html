<script>
document.addEventListener('DOMContentLoaded', function() {
  // Get all navigation links that start with /#
  const navLinks = document.querySelectorAll('a[href^="/#"]');
  
  navLinks.forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      
      // Get the href and extract the section name
      const href = this.getAttribute('href');
      const sectionName = href.replace('/#', '');
      
      // Try to find the section with various ID formats
      let target = document.getElementById(sectionName);
      
      // If not found, try with # in the ID (just in case)
      if (!target) {
        target = document.getElementById('#' + sectionName);
      }
      
      // If still not found, try finding by text content
      if (!target) {
        const headings = document.querySelectorAll('h2, h1');
        headings.forEach(h => {
          if (h.textContent.trim().toLowerCase().includes(sectionName.toLowerCase())) {
            target = h;
          }
        });
      }
      
      if (target) {
        target.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }
    });
  });
});
</script>
