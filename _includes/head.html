{% include base_path %}

<meta charset="utf-8">

{% include seo.html %}

<link href="{% if site.atom_feed.path %}{{ site.atom_feed.path }}{% else %}{{ base_path }}/feed.xml{% endif %}" type="application/atom+xml" rel="alternate" title="{{ site.title }} Feed">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script>
  document.documentElement.className = document.documentElement.className.replace(/\bno-js\b/g, '') + ' js ';
</script>

<!-- For all browsers -->
<link rel="stylesheet" href="{{ base_path }}/assets/css/main.css">


<!-- ========== ADD SMOOTH SCROLL JAVASCRIPT HERE ========== -->
<script>
document.addEventListener('DOMContentLoaded', function() {
  // Get all navigation links that start with /#
  const navLinks = document.querySelectorAll('a[href^="/#"]');
  
  navLinks.forEach(link => {
    link.addEventListener('click', function(e) {
      e.preventDefault();
      
      // Get the href and extract the section name
      const href = this.getAttribute('href');
      const sectionName = href.replace('/#', '');
      
      // Try to find the section with various ID formats
      let target = document.getElementById(sectionName);
      
      // If not found, try with # in the ID (just in case)
      if (!target) {
        target = document.getElementById('#' + sectionName);
      }
      
      // If still not found, try finding by text content
      if (!target) {
        const headings = document.querySelectorAll('h2, h1');
        headings.forEach(h => {
          if (h.textContent.trim().toLowerCase().includes(sectionName.toLowerCase())) {
            target = h;
          }
        });
      }
      
      if (target) {
        target.scrollIntoView({
          behavior: 'smooth',
          block: 'start'
        });
      }
    });
  });
});
</script>
